services:
  - type: web
    name: arihaan-enterprises-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HTTP_REQUEST_TIMEOUT_MS
        value: 3600000
      - key: HTTP_HEADERS_TIMEOUT_MS
        value: 3610000
      - key: HTTP_KEEP_ALIVE_TIMEOUT_MS
        value: 65000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ASSET_STORAGE_PROVIDER
        value: r2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: R2_KEY_PREFIX
        value: uploads
      - key: OPENAI_MODEL
        value: gpt-5
      - key: AI_REQUIRE_SUCCESS
        value: true
      - key: AI_RETRY_ATTEMPTS
        value: 3
